<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RescuePH — Real-Time Hazard Monitoring</title>

  <!-- Google Fonts - Modern font stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

  <!-- App styles -->
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* quick safety to ensure autocomplete dropdown sits above map tiles */
    .suggestions { position: absolute; z-index: 10002; max-height: 280px; overflow:auto; }
  </style>
</head>
<body>

  <!-- NEW: SIDE ICON DOCK -->
  <div id="sideDock">
    <button id="btnHazards" class="dock-btn">🌋</button>
    <button id="btnWeather" class="dock-btn">🌦</button>
  </div>

  <!-- NEW: DRAWER PANEL (CONTENT WILL COME LATER) -->
  <div id="drawerPanel">
    <div id="drawerContent">
      <!-- panel content goes here later -->
    </div>
  </div>

  <header class="app-header">
    <div class="header-content">
      <div class="title-wrap">
        <h1>RescuePH</h1>
        <span class="subtitle">Real-Time Hazard Monitoring</span>
      </div>
      <div class="controls">
        <div class="search-container">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input id="citySearch" class="search" placeholder="Search city or municipality..." autocomplete="off" />
          <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <button id="clearBtn" class="btn-secondary">Clear</button>
      </div>
    </div>
  </header>


  <div id="map"></div>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <div id="loadingText">Loading weather...</div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- App script -->
  <script src="script.js"></script>

</body>
</html>
