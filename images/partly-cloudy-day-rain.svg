<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes rotate { to { transform: rotate(360deg); } }
      @keyframes rain-drop { 0% { transform: translateY(-8px); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(15px); opacity: 0; } }
      .sun { animation: rotate 20s linear infinite; transform-origin: 14px 10px; }
      .drop1 { animation: rain-drop 1.5s ease-in infinite; }
      .drop2 { animation: rain-drop 1.5s ease-in infinite 0.4s; }
    </style>
  </defs>
  <g class="sun">
    <circle cx="14" cy="10" r="5" fill="#FFD700"/>
    <g stroke="#FFD700" stroke-width="1" stroke-linecap="round">
      <line x1="14" y1="2" x2="14" y2="0.5"/>
      <line x1="14" y1="20" x2="14" y2="18.5"/>
      <line x1="22" y1="10" x2="23.5" y2="10"/>
    </g>
  </g>
  <path d="M18 26 Q14 26 12 30 Q9 30 9 33 Q9 36 12 37 L44 37 Q47 37 47 34 Q47 31 45 30 Q43 27 39 27 Q37 25 33 25 Z" fill="#D0D0D0" stroke="#A0A0A0" stroke-width="0.4"/>
  <line class="drop1" x1="14" y1="39" x2="12" y2="47" stroke="#4A90E2" stroke-width="1.2" stroke-linecap="round"/>
  <line class="drop2" x1="32" y1="39" x2="30" y2="47" stroke="#4A90E2" stroke-width="1.2" stroke-linecap="round"/>
</svg>