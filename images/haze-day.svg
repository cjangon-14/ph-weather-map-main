<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes rotate { to { transform: rotate(360deg); } }
      .sun { animation: rotate 20s linear infinite; transform-origin: 14px 10px; }
      @keyframes fade { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.7; } }
      .haze { animation: fade 3s ease-in-out infinite; }
    </style>
  </defs>
  <g class="sun">
    <circle cx="14" cy="10" r="5" fill="#FFD700"/>
    <g stroke="#FFD700" stroke-width="1" stroke-linecap="round">
      <line x1="14" y1="2" x2="14" y2="0.5"/>
      <line x1="14" y1="20" x2="14" y2="18.5"/>
      <line x1="22" y1="10" x2="23.5" y2="10"/>
      <line x1="6" y1="10" x2="4.5" y2="10"/>
    </g>
  </g>
  <path class="haze" d="M4 30 L56 30" stroke="#D0D0D0" stroke-width="2" stroke-linecap="round"/>
  <path class="haze" d="M8 38 L52 38" stroke="#D0D0D0" stroke-width="2" stroke-linecap="round" style="animation-delay: 0.3s;"/>
  <path class="haze" d="M6 46 L54 46" stroke="#D0D0D0" stroke-width="2" stroke-linecap="round" style="animation-delay: 0.6s;"/>
</svg>