  <path d="M6 28 Q2 28 2 32 Q2 36 6 36 L50 36 Q54 36 54 32 Q54 28 50 28 Q48 24 42 24 Q38 20 30 20 Q18 20 14 26 Q8 26 6 28 Z" fill="#B8B8B8" stroke="#808080" stroke-width="0.5"/>
